name: ci
on: [push, pull_request]
jobs:
  scaffold:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: [collector, gateway, hub, agent]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Render template (recipe=${{ matrix.recipe }})
        run: uvx copier copy --defaults --trust -d project_name="CI Front" -d recipe=${{ matrix.recipe }} . /tmp/ci-front
      - name: Generated project tests pass
        run: cd /tmp/ci-front && uv run pytest -q
