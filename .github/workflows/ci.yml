name: ci
on: [push, pull_request]
jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Render template (defaults)
        run: uvx copier copy --defaults --trust -d project_name="CI Front" . /tmp/ci-front
      - name: Generated project tests pass
        run: cd /tmp/ci-front && uv run pytest -q
